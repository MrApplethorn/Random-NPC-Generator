<!DOCTYPE html>
<html>
  <head>
    <title>Random NPC Generator</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f2f2f2;
        text-align: center;
        margin: 0;
        padding: 0;
      }
      h1 {
        color: #333;
      }
      p {
        font-size: 18px;
        color: #666;
      }
      button {
        background-color: #3498db;
        color: #fff;
        border: none;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.3s ease;
      }
      button:hover {
        background-color: #2980b9;
      }
    </style>
  </head>
  <body>
    <h1>Random NPC Generator</h1>
    <p>Your random NPC will appear here:</p>
    <button id="generateButton">Generate NPC</button>
    <!-- JavaScript code goes here -->
    <script>
      // Define an array of words
      const traits = ["Abhorrent Person", "Aggressive Person", "Ancient Person", "Beautiful Person", "Child", "Eccentric Person", "Famous Person", "Focal Person", "Genius", "Hideous Person", "Humorous Person", "Impoverished Person", "Mysterious Person", "Notorious Person", "Power Hungry Person", "Saintly Person", "Wealthy Person", "Zealot", "Academic", "Adventurer", "Businessperson", "Criminal", "Entertainer", "Military Person", "Occultist", "Policeperson", "Political Person", "Primal Person", "Religious Person", "Royalty", "Artist", "Charming Person", "Counselor", "Crafter", "Dilettante", "Laborer", "Leader", "Magical Person", "Medic", "Merchant", "Outdoorsman", "Pilot", "Scholar", "Scientist", "Stealthy Person", "Warrior", "White Collar Worker"];
      const keywords = ["Academic", "Ambitious", "Anxious", "Arrogant", "Bitter", "Bloodthirsty", "Blunt", "Bold", "Brilliant", "Calculating", "Callous", "Capricious", "Cautious", "Charming", "Clever", "Corrupt", "Cowardly", "Cunning", "Curious", "Defiant", "Devoted", "Disturbed", "Dogmatic", "Enigmatic", "Fair", "Foolish", "Fussy", "Garrulous", "Greedy", "Grim", "Hedonistic", "Honorable", "Hotheaded", "Humble", "Idealistic", "Ignorant", "Impish", "Impressionable", "Incompetent", "Intense", "Intimidating", "Jaded", "Jovial", "Judgmental", "Kind", "Kinky", "Lecherous", "Lively", "Macho", "Mean", "Mild", "Miserly", "Naïve", "Noble", "Noncomformist", "Nosy", "Obedient", "Oblivious", "Oily", "Optimistic", "Passionate", "Pessimistic", "Philosophical", "Poised", "Proud", "Quaint", "Quiet", "Rakish", "Rebellious", "Remorseful", "Ruthless", "Scheming", "Sensuous", "Shady", "Sly", "Tactless", "Tough", "Unlucky", "Unpredictable", "Unscrupulous", "Weak-Willed", "Weird", "Wise"];
      // Get a reference to the button element
      const generateButton = document.getElementById("generateButton");
      // Function to generate a random word
      function generateRandomTrait() {
      const randomIndex1 = Math.floor(Math.random() * traits.length);
      const randomIndex2 = Math.floor(Math.random() * keywords.length);
      const randomTrait = traits[randomIndex1];
      const randomKeyword = keywords[randomIndex2];
      document.querySelector("p").textContent = `Random NPC: ${randomKeyword} ${randomTrait}`;
      }
      // Attach an event listener to the button
      generateButton.addEventListener("click", generateRandomTrait);
    </script>
  </body>
</html>
